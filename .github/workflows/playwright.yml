# ============================================================
# GitHub Actions — Playwright CI/CD Pipeline
# ============================================================
# Triggers: push to main/develop, pull requests to main
# Runs: full test suite on Chromium, Firefox, WebKit
# Artifacts: HTML report, test results (retained 30 days)
# ============================================================

name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      # Run all browser matrix entries even if one fails
      fail-fast: false
      matrix:
        # Run each browser in a separate job for faster feedback
        browser: [chromium, firefox, webkit]

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Playwright browsers ───────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run Playwright tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://ares.smarterrisk.app/' }}
          VALID_EMAIL: ${{ secrets.VALID_EMAIL }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PARTNER_EMAIL: ${{ secrets.PARTNER_EMAIL }}
          PARTNER_PASSWORD: ${{ secrets.PARTNER_PASSWORD }}

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: playwright-report-${{ matrix.browser }}
          path: reports/html/
          retention-days: 30

      - name: Upload test results (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: failure() # Only upload on failure to save storage
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
